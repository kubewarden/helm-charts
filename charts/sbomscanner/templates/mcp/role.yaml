{{- if .Values.mcp.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    {{ include "sbomscanner.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
  name: {{ include "sbomscanner.fullname" . }}-mcp
rules:
- apiGroups:
  - sbomscanner.kubewarden.io
  resources:
  - registries
  - scanjobs
  - workloadscanconfigurations
  - vexhubs
  verbs:
  - get
  - list
  - watch
{{- if not .Values.mcp.readOnly }}
- apiGroups:
  - sbomscanner.kubewarden.io
  resources:
  - registries
  - scanjobs
  - vexhubs
  verbs:
  - create
  - update
  - patch
  - delete
{{- end }}
- apiGroups:
  - storage.sbomscanner.kubewarden.io
  resources:
  - images
  - sboms
  - vulnerabilityreports
  - workloadscanreports
  verbs:
  - get
  - list
  - watch
{{- end }}
