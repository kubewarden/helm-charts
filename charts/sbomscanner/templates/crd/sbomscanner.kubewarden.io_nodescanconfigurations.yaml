---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
    helm.sh/resource-policy: keep
  name: nodescanconfigurations.sbomscanner.kubewarden.io
spec:
  group: sbomscanner.kubewarden.io
  names:
    kind: NodeScanConfiguration
    listKind: NodeScanConfigurationList
    plural: nodescanconfigurations
    singular: nodescanconfiguration
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          NodeScanConfiguration is the Schema for the nodescanconfigurations API.
          This is a singleton resource - only one instance named "default" is allowed.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: NodeScanConfigurationSpec defines the desired configuration
              for node scanning.
            properties:
              enabled:
                default: true
                description: Enabled controls whether node scanning is active.
                type: boolean
              nodeSelector:
                description: |-
                  NodeSelector filters which nodes are scanned.
                  If not specified, all the nodes are scanned.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              platforms:
                description: |-
                  Platforms allows to specify the list of platforms to scan.
                  If not set, all nodes are scanned regardless of their platform.
                items:
                  description: Platform describes the platform which the image in
                    the manifest runs on.
                  properties:
                    arch:
                      description: |-
                        Architecture field specifies the CPU architecture, for example
                        `amd64` or `ppc64le`.
                      type: string
                    os:
                      description: OS specifies the operating system, for example
                        `linux` or `windows`.
                      type: string
                    variant:
                      description: |-
                        Variant is an optional field specifying a variant of the CPU, for
                        example `v7` to specify ARMv7 when architecture is `arm`.
                      type: string
                  required:
                  - arch
                  - os
                  type: object
                type: array
              scanInterval:
                description: ScanInterval is the interval at which nodes are scanned.
                type: string
              skipPatterns:
                default:
                - /var/lib/containerd/
                - /var/lib/docker/
                - /var/lib/rancher/k3s/agent/containerd/
                - /var/lib/rancher/rke2/agent/containerd/
                - /var/lib/containers/
                - /run/containerd/
                - /run/k3s/containerd/
                description: |-
                  SkipPatterns specifies gitignore-style patterns for directories and files to skip during node scanning.
                  Patterns ending with "/" are treated as directories.
                  All other patterns are treated as files.
                  Glob patterns like "**/vendor/" or "*.min.js" are supported.

                  If unset, container-runtime state is skipped by default:
                    - /var/lib/containerd/
                    - /var/lib/docker/
                    - /var/lib/rancher/k3s/agent/containerd/
                    - /var/lib/rancher/rke2/agent/containerd/
                    - /var/lib/containers/
                    - /run/containerd/
                    - /run/k3s/containerd/
                  Set to an empty list to scan everything, including the paths above.
                items:
                  type: string
                type: array
            required:
            - enabled
            type: object
        type: object
        x-kubernetes-validations:
        - message: NodeScanConfiguration name must be 'default'
          rule: self.metadata.name == 'default'
    served: true
    storage: true
    subresources:
      status: {}
