# This is a Rancher questions file
---
questions:
  # Audit checks:
  - variable: "auditScanner.enable"
    type: boolean
    default: false
    required: true
    label: Enable Background Audit check
    description: |
      The Background Audit Check looks at existing Kubernetes resources and
      periodically determines whether they are still compliant with regards to the
      policies that are currently defined.
    group: "Audit checks"
  - variable: "auditScanner.cronJob.schedule"
    type: string
    default: "0 * * * *"
    show_if: auditScanner.enable=true
    label: Schedule
    description: |
      Schedule of the Background Audit check. Follows the Unix-cron syntax.
    group: "Audit checks"
  - variable: "auditScanner.disableStore"
    show_if: auditScanner.enable=true
    type: boolean
    default: false
    label: Don't store (Cluster)Reports in etcd
    description: |
      If true, (Cluster)Reports are not stored in etcd but using an in-memory cache.
      Note that you may need to adjust `resources.auditScanner` when using the
      in-memory store.
    group: "Audit checks"
  - variable: "auditScanner.serviceAccountName"
    type: string
    default: "audit-scanner"
    show_if: auditScanner.enable=true
    label: ServiceAccount name
    description: |
      The default audit-scanner ServiceAccount is bound to the ClusterRoles
      "view" (allows read-only access to most objects in a namespace, does not
      allow viewing secrets, roles or role bindings), and "audit-scanner-cluster-role"
      (allows read-write to Kubewarden resources and Reports).
    group: "Audit checks"
  - variable: "auditScanner.policyReporter"
    type: boolean
    default: false
    show_if: auditScanner.enable=true
    label: Enable Policy Reporter UI
    description: |
      Policy reporter is a UI to visualize the reports generated by Background
      Audit checks
    group: "Audit checks"
  - variable: "auditScanner.skipAdditionalNamespaces"
    type: array[
    show_if: auditScanner.enable=true
    label: Additional namespaces to skip from audit
    description: |
      Additional namespaces that the audit scanner will not scan.
    group: "Audit checks"
  - variable: "auditScanner.parallelNamespaces"
    type: integer
    default: 1
    required: false
    show_if: auditScanner.enable=true
    label: Number of Namespaces to be audited in parallel
    description: |
      The audit-scanner iterate over all the Namespaces in the cluster. This
      value controls how many Namespaces are audited at the same time.
    group: "Audit checks"
  - variable: "auditScanner.parallelResources"
    type: integer
    default: 100
    required: false
    show_if: auditScanner.enable=true
    label: Number of resources to be audited in parallel
    description: |
      The audit-scanner iterates over all the resources of a certain type found
      inside of a Namespace. This parameter controls how many resources are
      audited at the same time.

      For example, if a Namespace has 1000 Pods, and this value is set to 100,
      the audit-scanner will audit 100 Pods at the same time.
    group: "Audit checks"
  - variable: "auditScanner.parallelPolicies"
    type: integer
    default: 5
    required: false
    show_if: auditScanner.enable=true
    label: Number of policies to evaluate fora given resournce in parallel
    description: |
      For each specific resource, the audit-scanner evaluates all the policies
      that are interested about this kind of resource. This parameter controls
      how many policies are evaluated at the same time.

      For example, if 10 policies are interested in Pods, and this value is set
      to 5, the audit-scanner will evaluate 5 policies at the same time.
    group: "Audit checks"
  - variable: "auditScanner.pageSize"
    type: integer
    default: 100
    required: false
    show_if: auditScanner.enable=true
    label: Number of resources to fetch from the Kubernetes API server when paginating
    description: |
      When looking into a specific type of resource, audit-scanner fetches these objects
      in chunks. This parameter controls how many resources are fetched at the same time.
    group: "Audit checks"
  # controller HA:
  - variable: "replicas"
    type: integer
    default: 1
    required: true
    label: Number of replicas
    description: |
      Number of replicas of the Controller Deployment
    group: "Controller HA"
  - variable: "global.priorityClassName"
    type: string
    default: ""
    required: false
    label: Name of priorityClass
    description: |
      Name of the priorityClass to apply to the Kubewarden controller.
    group: "Controller HA"
  # OpenTelemetry:
  - variable: "telemetry.mode"
    type: enum
    options:
      - "sidecar"
      - "custom"
    default: "sidecar"
    required: true
    label: Telemetry mode
    description: |
      Choose the telemetry mode.
      Sidecar mode will deploy an OpenTelemetry Collector as a sidecar container in the Kubewarden Controller pod.
      Custom mode will allow you to configure the OpenTelemetry Collector by your own and Kubewarden will send data to it.
    group: "OpenTelemetry"
  - variable: "telemetry.metrics"
    type: boolean
    default: false
    required: true
    label: Enable Metrics
    description: |
      Enable metrics collection for all Policy Servers and the Kubewarden Controller.
      Important: Requires OpenTelemetry CRDs available.
    group: "OpenTelemetry"
  - variable: "telemetry.sidecar.metrics.port"
    type: string
    default: "8080"
    label: Port
    description: |
      Port of the Prometheus exporter and PolicyServer metrics service.
    group: "OpenTelemetry"
    show_if: "telemetry.mode=sidecar && telemetry.metrics=true"
  - variable: "telemetry.tracing"
    type: boolean
    default: false
    required: true
    label: Enable Tracing
    description: |
      Enable tracing collection for all PolicyServers.
      Important: Requires OpenTelemetry CRDs available.
    group: "OpenTelemetry"
  - variable: "telemetry.sidecar.tracing.jaeger.endpoint"
    type: string
    default: my-open-telemetry-collector.jaeger.svc.cluster.local:4317
    label: Jaeger endpoint configuration
    description: |
      Configuration of the OTLP/Jaeger exporter.
    group: "OpenTelemetry"
    show_if: "telemetry.mode=sidecar && telemetry.tracing=true"
  - variable: "telemetry.sidecar.tracing.jaeger.tls.insecure"
    type: boolean
    default: false
    label: Jaeger endpoint insecure TLS configuration
    description: |
      Important: Insecure, not for production usage.
    group: "OpenTelemetry"
    show_if: "telemetry.mode=sidecar && telemetry.tracing=true"
  - variable: "telemetry.custom.endpoint"
    type: string
    default: ""
    label: OpenTelemetry endpoint
    description: |
      Endpoint of the OpenTelemetry collector.
    group: "OpenTelemetry"
    show_if: "telemetry.mode=custom"
  - variable: "telemetry.custom.insecure"
    type: boolean
    default: false
    label: Insecure communication
    description: |
      Disable TLS verification for the OpenTelemetry collector.
    group: "OpenTelemetry"
    show_if: "telemetry.mode=custom"
  - variable: "telemetry.custom.otelCollectorCertificateSecret"
    type: string
    default: ""
    label: Certificate secret
    description: |
      Secret containing the certificate for the OpenTelemetry collector.
      The secret should contain the key `ca.crt`.
    group: "OpenTelemetry"
    show_if: "telemetry.mode=custom && telemetry.custom.insecure=false"
  - variable: "telemetry.custom.otelCollectorClientCertificateSecret"
    type: string
    default: ""
    label: Client certificate secret
    description: |
      Secret containing the client certificate for the OpenTelemetry collector (mTLS).
      The secret should contain the keys `tls.crt` and `tls.key`.
    group: "OpenTelemetry"
    show_if: "telemetry.mode=custom && telemetry.custom.insecure=false"
  # CRD Settings:
  - variable: "installPolicyReportCRDs"
    type: boolean
    default: false
    required: false
    label: Install PolicyReport CRDs
    description: |
      Install the PolicyReport and ClusterPolicyReport CRDs.
    group: "CRD Settings"
  - variable: "installOpenReportsCRDs"
    type: boolean
    default: true
    required: false
    label: Install OpenReports CRDs
    description: |
      Install the OpenReports CRDs via the openreports subchart.
    group: "CRD Settings"
  # Default PolicyServer questions
  - variable: "policyServer.enabled"                                                                                                                                                                                                
    type: boolean                                                                                                                                                                                                                   
    default: true                                                                                                                                                                                                                   
    required: true                                                                                                                                                                                                                  
    label: Enable default PolicyServer                                                                                                                                                                                              
    description: |                                                                                                                                                                                                                  
      Deploy a default PolicyServer instance managed by the controller.                                                                                                                                                             
    group: "Default PolicyServer"                                                                                                                                                                                                   
  - variable: "policyServer.image.repository"                                                                                                                                                                                       
    type: string
    default: "kubewarden/adm-controller/policy-server"
    show_if: policyServer.enabled=true
    label: PolicyServer image repository
    description: |
      Container image repository for the default PolicyServer.
    group: "Default PolicyServer"
  - variable: "policyServer.image.tag"
    type: string
    default: "v1.36.0"
    show_if: policyServer.enabled=true
    label: PolicyServer image tag
    description: |
      Container image tag for the default PolicyServer.
    group: "Default PolicyServer"
  - variable: "policyServer.serviceAccountName"
    type: string
    required: true
    label: Name of the ServiceAccount associated to the PolicyServer default
    description: |
      The ServiceAccount that is being used by the default PolicyServer to interact
      with the Kubernetes API Server.
    group: "Default PolicyServer"
  # Default PolicyServer HA
  - variable: "policyServer.replicaCount"
    type: integer
    default: 1
    required: true
    label: Number of replicas
    description: |
      Number of replicas of the PolicyServer Deployment
    group: "Default PolicyServer HA"
  - variable: "global.priorityClassName"
    type: string
    default: ""
    required: false
    label: Name of priorityClass associated to the PolicyServer Pods
    description: |
      Name of the priorityClass to apply to default PolicyServer Pods.
    group: "Default PolicyServer HA"
  # Recommended policies questions:
  - variable: "recommendedPolicies.enabled"
    type: boolean
    default: false
    required: true
    label: Enable recommended policies
    description: |
      Whether the recommended policies are enabled or not. Recommended
      policies are a minimum set of policies that secure your cluster and
      Kubewarden, while leaving the system namespaces untouched.
    group: "Recommended Policies"
  - variable: "recommendedPolicies.defaultPolicyMode"
    type: enum
    options:
      - "monitor"
      - "protect"
    default: "monitor"
    show_if: recommendedPolicies.enabled=true
    label: Execution mode of the recommended policies
    description: |
      Execution mode of the recommended policies. "protect" will reject requests,
      "monitor" will log them. Transitioning from "monitor" to "protect" is
      allowed, but not from "protect" to "monitor".
    group: "Recommended Policies"
  - variable: "recommendedPolicies.skipAdditionalNamespaces"
    type: array[
    show_if: recommendedPolicies.enabled=true
    label: Additional namespaces to skip from evaluation
    description: |
      Additional namespaces that the recommended policies will not apply to.
    group: "Recommended Policies"
  # no-privilege-escalation policy settings
  - variable: recommendedPolicies.allowPrivilegeEscalationPolicy.settings.allowPrivilegeEscalation
    description: >-
      This policy works by inspecting the containers and init containers of a Pod.
      If any of these containers have `allowPrivilegeEscalation` enabled, the Pod
      will be rejected.
    tooltip: >-
      Used to default to disallow, while still permitting pods to request
      allowPrivilegeEscalation explicitly.
    label: Allow privilege escalation
    required: false
    type: boolean
    group: "no-privilege-escalation policy settings"
  # drop-capabilities policy settings
  - variable: recommendedPolicies.capabilitiesPolicy.settings.allowed_capabilities
    description: Provides a list of capabilities that are allowed to be added to a container
    tooltip: Specified as the capability name in ALL_CAPS. (e.g. `CHOWN`, `KILL`)
    group: "drop-capabilities policy settings"
    label: Allowed capabilities
    required: false
    type: array[
  - variable: recommendedPolicies.capabilitiesPolicy.settings.required_drop_capabilities
    description: The capabilities which must be dropped from containers.
    tooltip: Specified as the capability name in ALL_CAPS. (e.g. `NET_ADMIN`)
    group: "drop-capabilities policy settings"
    label: Required drop capabilities
    required: false
    type: array[
  - variable: recommendedPolicies.capabilitiesPolicy.settings.default_add_capabilities
    description: >-
      The capabilities which are added to containers by default, in addition to
      the runtime defaults.
    tooltip: Specified as the capability name in ALL_CAPS. (e.g. `CHOWN`)
    group: "drop-capabilities policy settings"
    label: Default add capabilities
    required: false
    type: array[
  # host namespace policy settings
  - variable: recommendedPolicies.hostNamespacePolicy.settings.allow_host_ipc
    tooltip: Allows the pod to set .spec.HostIPC to true.
    group: no-host-namespace-sharing policy settings
    label: Allow host IPC
    required: false
    type: boolean
  - variable: recommendedPolicies.hostNamespacePolicy.settings.allow_host_network
    tooltip: Allows the pod to set .spec.HostNetwork to true.
    group: no-host-namespace-sharing policy settings
    label: Allow host network
    required: false
    type: boolean
  - variable: recommendedPolicies.hostNamespacePolicy.settings.allow_host_pid
    tooltip: Allows the pod to set .spec.HostPID to true.
    group: no-host-namespace-sharing policy settings
    label: Allow host PID
    required: false
    type: boolean
  # no-privileged-pod policy settings
  - variable: recommendedPolicies.podPrivilegedPolicy.settings.skip_init_containers
    tooltip: >-
      Ignore that some init container is configured as privileged
    group: no-privileged-pod policy settings
    label: Skip init containers
    required: false
    type: boolean
  - variable: recommendedPolicies.podPrivilegedPolicy.settings.skip_ephemeral_containers
    tooltip: >-
      Ignore that some ephemeral container is configured as privileged
    group: no-privileged-pod policy settings
    label: Skip ephemeral containers
    required: false
    type: boolean
  # Some recommended policies settings are not possible due Rancher limitations.
  # sequence[ is not implemented in rancher/dashboard yet: https://github.com/rancher/dashboard/issues/10826
