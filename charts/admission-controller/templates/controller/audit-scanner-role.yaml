{{- if eq .Values.auditScanner.serviceAccountName  "audit-scanner" }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: audit-scanner-cluster-role
  labels:
    {{- include "admission-controller.labels" . | nindent 4 }}
  annotations:
    {{- include "admission-controller.annotations" . | nindent 4 }}
rules:
- apiGroups:
  - policies.kubewarden.io
  resources:
  - clusteradmissionpolicies
  - clusteradmissionpolicygroups
  - admissionpolicies
  - admissionpolicygroups
  - clusteradmissionpolicies/status
  - clusteradmissionpolicygroups/status
  - admissionpolicies/status
  - admissionpolicygroups/status
  - policyservers
  - policyservers/status
  verbs:
  - get
  - list
  - watch
- apiGroups:
    - wgpolicyk8s.io
  resources:
    - policyreports
    - clusterpolicyreports
  verbs:
    - create
    - delete
    - deletecollection
    - get
    - list
    - patch
    - update
    - watch
- apiGroups:
    - openreports.io
  resources:
    - reports
    - clusterreports
  verbs:
    - create
    - delete
    - deletecollection
    - get
    - list
    - patch
    - update
    - watch
{{ end }}
